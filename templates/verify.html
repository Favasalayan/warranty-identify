<!DOCTYPE html>
<html>

<head>

<title>Warranty Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f4f6f9">

<div class="container mt-5">

<h3>Warranty Verification</h3>

<p><b>Invoice: {{invoice}}</b></p>

{% for i in items %}

<p><b>Item : </b>{{i.item}}</p>
<p><b>Expiry Date : </b>{{i.expiry}}</p>

<p><b>Service Provider : </b>{{i.warranty_provider}}</p>
<p><b>Contact : </b>{{i.phone}}</p>






{% endfor %}

</table>

</div>

</body>

</html>
