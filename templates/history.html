{% extends "base.html" %}
{% block content %}

<div class="card card-custom p-4">

<div class="d-flex justify-content-between align-items-center mb-3">

<h4>
<i class="bi bi-clock-history"></i> Scan History
</h4>

<form method="POST" action="/clear_history/">
{% csrf_token %}

<button class="btn btn-danger btn-sm">
<i class="bi bi-trash"></i> Clear History
</button>

</form>

</div>

<table class="table table-striped">

<thead>

<tr>
<th>Invoice</th>
<th>Date</th>
<th></th>
</tr>

</thead>

<tbody>

{% for h in history %}

<tr>

<td>{{h.invoice_no}}</td>
<td>{{h.searched_at}}</td>

<td>

<a href="/result/{{h.invoice_no}}/" class="btn btn-sm btn-primary">

View

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
