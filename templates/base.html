{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Warranty System</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
background-image: url("{% static 'images/bg.png' %}");
background-size: cover;
font-family:Inter,Segoe UI;
}

/* Top Navbar */

.topbar{
height:60px;
background:white;
border-bottom:1px solid #eaeaea;
display:flex;
align-items:center;
padding:0 25px;
}

/* Sidebar */

.sidebar{
width:180px;
height:100vh;
background:white;
border-right:5px solid #eaeaea;
position:fixed;
}

.sidebar .logo{
padding:20px;
text-align:center;
}

.sidebar img{
width:140px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:#333;
text-decoration:solid;
font-weight:500;
}

.sidebar a:hover{
background:#f3f5f9;
}

/* Content */

.content{
margin-left:160px;
padding:20px 30px;
}

.container-fluid{
padding-left:0;
}

/* Cards */

.dashboard-card{
border:1px solid #eaeaea;
border-radius:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

/* Scanner */

#reader{
border-radius:10px;
overflow:hidden;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">

<img src="{% static 'images/housecare_logo.png' %}">

</div>

<a href="/"><i class="bi bi-upc-scan"></i> Scan Invoice</a>
<a href="/history/"><i class="bi bi-clock-history"></i> Scan History</a>
<a href="/warranty-cards/">Warranty Cards</a>

</div>


<!-- Main Content -->

<div class="content">

<div class="topbar">

<h5 class="mb-0"> <i class="bi bi-shield-check"></i>Warranty System </h5>

</div>

<div class="container-fluid mt-4">

{% block content %}

{% endblock %}

</div>

</div>

</body>
</html>
